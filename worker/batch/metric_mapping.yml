# ======================================================
# Metric Mapping Configuration
# ======================================================
# 列名正規化のためのマッピング設定ファイル。
# ワーカー起動時に読み込まれ、Excel/CSVの列名を標準メトリクス名に変換する。
#
# 各メトリクスには以下のフィールドがある:
#   include: マッチ候補の列名リスト（完全一致・部分一致・同義語で使用）
#   exclude: 誤マッチ防止のための除外語リスト（列名にこれらが含まれる場合は減点）
#   core_keywords: 部分一致で使用するコアキーワード（短い語）
#
# スコアリングルール:
#   完全一致:       +100
#   単語境界一致:    +80  (例: _gmv_, gmv_, _gmv)
#   同義語一致:      +60  (includeリスト内の語が列名に含まれる)
#   コアキーワード:   +40  (core_keywordsが列名に含まれる)
#   除外語:          -50  (excludeリスト内の語が列名に含まれる)
#   数値列ボーナス:   +10  (列の値が数値型の場合)
#
# 閾値: スコアが 40 未満の場合は「未検出」として扱う
# ======================================================

