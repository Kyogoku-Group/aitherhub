name: Deploy Worker to VM

on:
  push:
    branches:
      - master
    paths:
      - 'worker/**'
      - 'shared/**'
      - 'deploy/**'
      - '.github/workflows/deploy_worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker via SSH

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WORKER_SSH_KEY }}" > ~/.ssh/worker_key
          chmod 600 ~/.ssh/worker_key
          ssh-keyscan -H ${{ secrets.WORKER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Worker VM
        env:
          SSH_HOST: ${{ secrets.WORKER_SSH_HOST }}
          SSH_USER: ${{ secrets.WORKER_SSH_USER }}
        run: |
          ssh -i ~/.ssh/worker_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'DEPLOY_SCRIPT'
            set -e

            echo "=== AitherHub Worker Deploy ==="
            echo "Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            cd /opt/aitherhub
            git config --global --add safe.directory /opt/aitherhub
            echo "Before: $(git rev-parse HEAD)"
            git fetch origin master
            git reset --hard origin/master
            echo "After:  $(git rev-parse HEAD)"

            if [ -f requirements.txt ]; then
              echo ""
              echo "=== Installing dependencies ==="
              pip install -r requirements.txt --quiet
            fi

            echo ""
            echo "=== Restarting worker ==="
            sudo systemctl restart aither-worker
            sleep 5

            echo ""
            echo "=== Worker status ==="
            sudo systemctl is-active aither-worker
            echo "Worker PID: $(systemctl show aither-worker --property=MainPID --value)"

            echo ""
            echo "=== Deploy complete ==="
            echo "Commit: $(git rev-parse HEAD)"
          DEPLOY_SCRIPT

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.WORKER_SSH_HOST }}
          SSH_USER: ${{ secrets.WORKER_SSH_USER }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          DEPLOYED=$(ssh -i ~/.ssh/worker_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} \
            "cd /opt/aitherhub && git rev-parse HEAD")
          echo "Expected: ${COMMIT_SHA}"
          echo "Deployed: ${DEPLOYED}"
          if [ "${DEPLOYED}" = "${COMMIT_SHA}" ]; then
            echo "SUCCESS: Commit matches"
          else
            echo "WARNING: Commit mismatch"
            exit 1
          fi

      - name: Health check
        env:
          SSH_HOST: ${{ secrets.WORKER_SSH_HOST }}
          SSH_USER: ${{ secrets.WORKER_SSH_USER }}
        run: |
          HEALTH=$(ssh -i ~/.ssh/worker_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} \
            "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health || echo 'no_health_endpoint'")
          echo "Health check result: ${HEALTH}"
          if [ "${HEALTH}" = "200" ]; then
            echo "SUCCESS: Worker health OK"
          else
            echo "INFO: Health endpoint returned ${HEALTH} (worker may not have health endpoint yet)"
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/worker_key
