name: Build and deploy Python app to Azure Web App - fast-api-kyogoku

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-fast-api-kyogoku
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv and install dependencies (backend only)
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: fast-api-kyogoku
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CADC6849BE114E58AD1CB2C9281CB379 }}
          package: backend

  verify_deploy:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment propagation
        run: sleep 60

      - name: Verify fast-api-kyogoku deployment
        run: |
          echo "Checking fast-api-kyogoku version..."
          for i in 1 2 3; do
            RESPONSE=$(curl -sf https://fast-api-kyogoku.azurewebsites.net/version || echo "FAIL")
            echo "Attempt $i: $RESPONSE"
            if [ "$RESPONSE" != "FAIL" ]; then
              DEPLOYED_COMMIT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit',''))" 2>/dev/null || echo "")
              echo "Deployed commit: $DEPLOYED_COMMIT"
              break
            fi
            sleep 15
          done
